<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE 3.28: Volatile Analyst Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --poe-gold: #eab308; --poe-bg: #0a0a0a; --poe-card: #141414; --poe-border: #3d3423; }
        body { background-color: var(--poe-bg); color: #e2e8f0; font-family: 'Inter', sans-serif; }
        h1, h2, h3, .poe-font { font-family: 'Cinzel', serif; }
        .card { background-color: var(--poe-card); border: 1px solid var(--poe-border); }
        .input-group { display: flex; background: #000; border: 1px solid #444; border-radius: 2px; }
        input, select { background: transparent; color: white; padding: 8px; outline: none; width: 100%; }
        .input-group select { width: 50px; border-left: 1px solid #444; background: #1a1a1a; font-size: 0.7rem; }
        .btn-poe { background: linear-gradient(180deg, #5c4d32 0%, #3d3423 100%); border: 1px solid var(--poe-gold); color: var(--poe-gold); font-family: 'Cinzel'; transition: all 0.2s; cursor: pointer; }
        .btn-poe:hover { background: var(--poe-gold); color: black; box-shadow: 0 0 10px rgba(234, 179, 8, 0.3); }
        .mod-box { border-left: 2px solid var(--poe-gold); padding: 12px; margin-bottom: 20px; position: relative; background: rgba(255,255,255,0.02); }
        label { display: block; font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .base-clarification { font-size: 0.55rem; color: #eab308; opacity: 0.8; font-style: italic; display: none; margin-bottom: 8px; border-bottom: 1px solid #3d3423; padding-bottom: 4px; }
        .multiplier-input { width: 45px !important; text-align: center; border-bottom: 1px solid #555 !important; padding: 0 !important; font-size: 0.75rem; color: #eab308; }
        .currency-icon { width: 24px; height: 24px; object-fit: contain; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center border-b border-yellow-900 pb-4">
            <div class="text-center md:text-left flex items-center gap-4">
                <img src="https://web.poecdn.com/gen/image/WzI1LDE0LHsiZiI6IjJESXRlbXMvQ3VycmVuY3kvVm9sYXRpbGVWYWFsT3JiIiwic2NhbGUiOjF9XQ/9bcdda2c63/VolatileVaalOrb.png" alt="Volatile Vaal Orb" class="w-12 h-12">
                <div>
                    <h1 class="text-4xl font-bold text-yellow-600">Volatile Analyst</h1>
                    <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase">PoE 3.28 Investment Forecaster</p>
                </div>
            </div>
            <div class="mt-4 md:mt-0 bg-black p-2 border border-yellow-900 px-4 flex items-center gap-3">
                <img src="https://web.poecdn.com/gen/image/WzI1LDE0LHsiZiI6IjJESXRlbXMvQ3VycmVuY3kvQ3VycmVuY3lNb2RWYWx1ZXMiLCJzY2FsZSI6MX1d/ec48896769/CurrencyModValues.png" class="currency-icon" alt="Divine">
                <label class="m-0">1 Divine =</label>
                <input type="number" id="divPrice" value="315" class="bg-transparent text-yellow-500 w-16 font-mono font-bold text-center border-b border-gray-700 outline-none" onchange="calculate()">
                <img src="https://web.poecdn.com/gen/image/WzI1LDE0LHsiZiI6IjJESXRlbXMvQ3VycmVuY3kvQ3VycmVuY3lSZXJvbGxSYXJlIiwic2NhbGUiOjF9XQ/46a2347805/CurrencyRerollRare.png" class="currency-icon" alt="Chaos">
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="space-y-6">
                <div class="card p-5">
                    <h2 class="text-sm text-yellow-500 mb-4 poe-font border-b border-yellow-900 pb-2">Investment Costs</h2>
                    <div class="mb-4 p-3 border border-yellow-900/40 bg-black/40 space-y-3">
                        <div>
                            <label>League</label>
                            <input type="text" id="leagueName" list="leagueList" value="Mirage" class="bg-black border border-gray-800 p-1 w-full text-sm" onchange="handleLeagueChange()">
                            <datalist id="leagueList"></datalist>
                        </div>
                        <div class="flex items-center justify-between gap-2">
                            <label class="m-0 text-[9px] text-gray-400 normal-case tracking-normal">
                                <input type="checkbox" id="autoMarket" class="mr-1 align-middle" checked onchange="handleAutoMarketToggle()">
                                Auto-fill Divine + Volatile prices from poe.ninja
                            </label>
                            <button id="refreshMarketBtn" onclick="refreshMarketPrices(true)" class="btn-poe text-[10px] px-2 py-1">Refresh</button>
                        </div>
                        <div id="marketStatus" class="text-[9px] text-gray-500">Loading market prices...</div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label>Base Item Price</label>
                            <div class="input-group">
                                <input type="number" id="itemPrice" value="150" onchange="calculate()">
                                <select id="itemUnit" onchange="calculate()"><option value="c">c</option><option value="d">d</option></select>
                            </div>
                        </div>
                        <div>
                            <label>Prep (Enchant/Quality/Fee)</label>
                            <div class="input-group">
                                <input type="number" id="prepPrice" value="0" onchange="calculate()">
                                <select id="prepUnit" onchange="calculate()"><option value="c">c</option><option value="d">d</option></select>
                            </div>
                        </div>
                        <div>
                            <label>Volatile Orb Price</label>
                            <div class="input-group">
                                <input type="number" id="orbPrice" value="375" onchange="calculate()">
                                <select id="orbUnit" onchange="calculate()"><option value="c">c</option><option value="d">d</option></select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card p-5">
                    <div class="flex justify-between items-center mb-4 border-b border-yellow-900 pb-2">
                        <h2 class="text-sm text-yellow-500 poe-font">Modifier Logic</h2>
                        <button onclick="addModifier()" class="text-[10px] text-yellow-700 hover:text-yellow-400 uppercase font-bold tracking-tighter">+ Add Mod</button>
                    </div>
                    <div id="modContainer">
                        <div class="mod-box">
                            <span class="base-clarification">SPECIFY RAW BASE VALUES BEFORE QUALITY/ENCHANTS:</span>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label>Min</label><input type="number" class="modMin bg-black border border-gray-800 p-1 w-full text-sm" value="10" onchange="calculate()"></div>
                                <div><label>Max</label><input type="number" class="modMax bg-black border border-gray-800 p-1 w-full text-sm" value="20" onchange="calculate()"></div>
                            </div>
                            <div class="mt-2">
                                <label>Target Value</label>
                                <input type="number" class="modTarget bg-black border border-gray-800 p-1 w-full text-sm" value="28" onchange="calculate()">
                            </div>
                            <select class="modMode bg-black border border-gray-800 p-1 w-full text-[10px] mt-2 text-gray-400" onchange="calculate()">
                                <option value="atLeast" selected>Result is ≥ Target (Max)</option>
                                <option value="atMost">Result is ≤ Target (Min)</option>
                            </select>
                            <div class="flex items-center gap-2 mt-3">
                                <input type="checkbox" class="modExtToggle w-3 h-3 cursor-pointer" checked onchange="calculate()">
                                <label class="m-0 text-[9px] text-gray-400 cursor-pointer">
                                    Final Multiplier: +<input type="number" class="multiplier-input modExtVal" value="20" onchange="calculate()">%
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="card p-4 text-center relative overflow-hidden">
                        <img src="https://web.poecdn.com/gen/image/WzI1LDE0LHsiZiI6IjJESXRlbXMvQ3VycmVuY3kvVm9sYXRpbGVWYWFsT3JiIiwic2NhbGUiOjF9XQ/9bcdda2c63/VolatileVaalOrb.png" class="absolute -right-2 -bottom-2 w-16 opacity-10 pointer-events-none" alt="">
                        <label>Hit Chance per Orb</label>
                        <div id="resProb" class="text-3xl font-bold text-blue-400 poe-font">-</div>
                        <p class="text-[9px] text-gray-500 mt-1 uppercase">(Inc. 50% Poof Chance)</p>
                    </div>
                    <div class="card p-4 text-center border-yellow-900/50 relative overflow-hidden">
                        <img src="https://web.poecdn.com/gen/image/WzI1LDE0LHsiZiI6IjJESXRlbXMvQ3VycmVuY3kvQ3VycmVuY3lNb2RWYWx1ZXMiLCJzY2FsZSI6MX1d/ec48896769/CurrencyModValues.png" class="absolute -right-2 -bottom-2 w-16 opacity-10 pointer-events-none" alt="">
                        <label>Avg Total Investment</label>
                        <div id="resAvgDiv" class="text-3xl font-bold text-yellow-500 poe-font">-</div>
                        <div id="resAvgChaos" class="text-xs text-gray-400">-</div>
                    </div>
                    <div class="card p-4 text-center border-red-900/50 relative overflow-hidden">
                         <img src="https://web.poecdn.com/gen/image/WzI1LDE0LHsiZiI6IjJESXRlbXMvQ3VycmVuY3kvQ3VycmVuY3lSZXJvbGxSYXJlIiwic2NhbGUiOjF9XQ/46a2347805/CurrencyRerollRare.png" class="absolute -right-2 -bottom-2 w-16 opacity-10 pointer-events-none" alt="">
                        <label>95% Confidence Cost</label>
                        <div id="resRisk" class="text-3xl font-bold text-red-600 poe-font">-</div>
                        <p class="text-[9px] text-gray-500 mt-1 uppercase italic">Safety budget for bad luck</p>
                    </div>
                </div>

                <div class="card p-6 min-h-[450px]">
                    <h3 class="poe-font text-yellow-600 mb-4 text-xs tracking-widest uppercase">Outcome Weighting Distribution (Mod 1)</h3>
                    <div class="relative h-[380px]">
                        <canvas id="distChart"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="card p-3 text-[10px] uppercase text-gray-400 flex justify-between items-center px-6">
                        <span>Avg Orbs Needed: <span id="statOrbs" class="text-white ml-2 font-mono">-</span></span>
                        <img src="https://web.poecdn.com/gen/image/WzI1LDE0LHsiZiI6IjJESXRlbXMvQ3VycmVuY3kvVm9sYXRpbGVWYWFsT3JiIiwic2NhbGUiOjF9XQ/9bcdda2c63/VolatileVaalOrb.png" class="w-6 h-6" alt="">
                    </div>
                    <div class="card p-3 text-[10px] uppercase text-gray-400 flex justify-between items-center px-6">
                        <span>Avg Bases Bought: <span id="statBases" class="text-white ml-2 font-mono">-</span></span>
                        <div class="w-6 h-6 border border-gray-700 bg-gray-900 rounded-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        const PROXY = 'https://poe-proxy.bernardo-7894.workers.dev/?url=';
        const MARKET_LEAGUES_URL = `${PROXY}${encodeURIComponent('https://api.poe.watch/leagues')}`;

        function getExchangePricesUrl(league) {
            const target = `https://poe.ninja/poe1/api/economy/exchange/current/overview?league=${encodeURIComponent(league)}&type=Currency`;
            return `${PROXY}${encodeURIComponent(target)}`;
        }

        function getStashPricesUrl(league) {
            const target = `https://poe.ninja/poe1/api/economy/stash/current/currency/overview?league=${encodeURIComponent(league)}&type=Currency`;
            return `${PROXY}${encodeURIComponent(target)}`;
        }

        function extractPricesFromExchangeData(data) {
            const lines = Array.isArray(data?.lines) ? data.lines : [];
            const items = Array.isArray(data?.items) ? data.items : [];
            if (!lines.length || !items.length) return null;

            const divineItem = items.find(item => item.name === 'Divine Orb');
            const volatileItem = items.find(item => item.name === 'Volatile Vaal Orb');
            if (!divineItem || !volatileItem) return null;

            const divineLine = lines.find(line => line.id === divineItem.id);
            const volatileLine = lines.find(line => line.id === volatileItem.id);
            if (!divineLine || !volatileLine) return null;

            const divineChaos = Number(divineLine.primaryValue);
            const volatileChaos = Number(volatileLine.primaryValue);
            if (!Number.isFinite(divineChaos) || !Number.isFinite(volatileChaos)) return null;

            return { divineChaos, volatileChaos, source: 'exchange trades' };
        }

        function extractPricesFromStashData(data) {
            const lines = Array.isArray(data?.lines) ? data.lines : [];
            if (!lines.length) return null;

            const divineLine = lines.find(line => line.currencyTypeName === 'Divine Orb');
            const volatileLine = lines.find(line => line.currencyTypeName === 'Volatile Vaal Orb');
            if (!divineLine || !volatileLine) return null;

            const divineChaos = Number(divineLine.chaosEquivalent);
            const volatileChaos = Number(volatileLine.chaosEquivalent);
            if (!Number.isFinite(divineChaos) || !Number.isFinite(volatileChaos)) return null;

            return { divineChaos, volatileChaos, source: 'stash listings' };
        }

        function setMarketStatus(message, tone = 'neutral') {
            const statusEl = document.getElementById('marketStatus');
            if (!statusEl) return;

            statusEl.textContent = message;
            if (tone === 'error') {
                statusEl.className = 'text-[9px] text-red-500';
            } else if (tone === 'ok') {
                statusEl.className = 'text-[9px] text-emerald-400';
            } else {
                statusEl.className = 'text-[9px] text-gray-500';
            }
        }

        function formatChaos(value) {
            return Number.isInteger(value) ? value.toFixed(0) : value.toFixed(1);
        }

        async function fetchJson(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        function isActiveLeague(league) {
            if (!league || !league.end_date) return false;
            if (league.end_date.startsWith('0001-01-01')) return true;
            const endDate = Date.parse(league.end_date);
            return Number.isFinite(endDate) && endDate > Date.now();
        }

        function pickDefaultLeague(leagues) {
            const active = leagues.filter(isActiveLeague);
            const preferred = active.find(league => !/(^|\s)(hardcore|standard|solo self-found|ssf|ruthless|hc)(\s|$)/i.test(league.name));
            return preferred?.name || active[0]?.name || leagues[0]?.name || 'Mirage';
        }

        function populateLeagueSuggestions(leagues) {
            const dataList = document.getElementById('leagueList');
            if (!dataList) return;
            dataList.innerHTML = '';

            leagues.forEach(league => {
                const option = document.createElement('option');
                option.value = league.name;
                dataList.appendChild(option);
            });
        }

        async function initializeMarketData() {
            const leagueInput = document.getElementById('leagueName');
            if (!leagueInput) return;

            try {
                setMarketStatus('Loading leagues from poe.watch...');
                const leagues = await fetchJson(MARKET_LEAGUES_URL);
                if (!Array.isArray(leagues) || leagues.length === 0) throw new Error('No leagues returned');

                populateLeagueSuggestions(leagues);
                leagueInput.value = pickDefaultLeague(leagues);
            } catch (error) {
                setMarketStatus('Could not load leagues from poe.watch. Enter league manually.', 'error');
            }

            await refreshMarketPrices(true);
        }

        function handleAutoMarketToggle() {
            if (document.getElementById('autoMarket').checked) {
                refreshMarketPrices(true);
            } else {
                setMarketStatus('Auto-fill disabled. Manual values stay active.');
            }
        }

        function handleLeagueChange() {
            refreshMarketPrices(document.getElementById('autoMarket').checked);
        }

        async function refreshMarketPrices(applyPrices = false) {
            const league = (document.getElementById('leagueName').value || '').trim();
            const refreshButton = document.getElementById('refreshMarketBtn');

            if (!league) {
                setMarketStatus('Enter a league name before fetching prices.', 'error');
                return;
            }

            try {
                if (refreshButton) refreshButton.disabled = true;
                setMarketStatus(`Fetching prices for ${league}...`);

                let prices = null;

                try {
                    const exchangeData = await fetchJson(getExchangePricesUrl(league));
                    prices = extractPricesFromExchangeData(exchangeData);
                } catch (error) {
                    prices = null;
                }

                if (!prices) {
                    const stashData = await fetchJson(getStashPricesUrl(league));
                    prices = extractPricesFromStashData(stashData);
                }

                if (!prices) throw new Error('Could not resolve market values');

                const { divineChaos, volatileChaos, source } = prices;

                if (applyPrices) {
                    document.getElementById('divPrice').value = formatChaos(divineChaos);
                    document.getElementById('orbPrice').value = formatChaos(volatileChaos);
                    document.getElementById('orbUnit').value = 'c';
                    calculate();
                    setMarketStatus(`Updated ${league} (${source}): 1 Divine = ${formatChaos(divineChaos)}c, Volatile Vaal Orb = ${formatChaos(volatileChaos)}c`, 'ok');
                } else {
                    setMarketStatus(`Fetched ${league} (${source}): 1 Divine = ${formatChaos(divineChaos)}c, Volatile Vaal Orb = ${formatChaos(volatileChaos)}c (auto-fill is off)`);
                }
            } catch (error) {
                setMarketStatus(`Could not fetch ${league} prices from poe.ninja. Manual values remain active.`, 'error');
            } finally {
                if (refreshButton) refreshButton.disabled = false;
            }
        }

        function addModifier() {
            const html = `
                <div class="mod-box">
                    <button onclick="this.parentElement.remove();calculate()" class="absolute top-0 right-1 text-red-900 text-xs">×</button>
                    <span class="base-clarification">SPECIFY RAW BASE VALUES BEFORE QUALITY/ENCHANTS:</span>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>Min</label><input type="number" class="modMin bg-black border border-gray-800 p-1 w-full text-sm" value="3" onchange="calculate()"></div>
                        <div><label>Max</label><input type="number" class="modMax bg-black border border-gray-800 p-1 w-full text-sm" value="4" onchange="calculate()"></div>
                    </div>
                    <div class="mt-2">
                        <label>Target Value</label>
                        <input type="number" class="modTarget bg-black border border-gray-800 p-1 w-full text-sm" value="5" onchange="calculate()">
                    </div>
                    <select class="modMode bg-black border border-gray-800 p-1 w-full text-[10px] mt-2 text-gray-400" onchange="calculate()">
                        <option value="atLeast" selected>Result is ≥ Target (Max)</option>
                        <option value="atMost">Result is ≤ Target (Min)</option>
                    </select>
                    <div class="flex items-center gap-2 mt-3">
                        <input type="checkbox" class="modExtToggle w-3 h-3 cursor-pointer" onchange="calculate()">
                        <label class="m-0 text-[9px] text-gray-400 cursor-pointer">
                            Final Multiplier: +<input type="number" class="multiplier-input modExtVal" value="8" onchange="calculate()">%
                        </label>
                    </div>
                </div>`;
            document.getElementById('modContainer').insertAdjacentHTML('beforeend', html);
            calculate();
        }

        function calculate() {
            const divRatio = parseFloat(document.getElementById('divPrice').value) || 315;
            const itemC = getC('itemPrice', 'itemUnit', divRatio);
            const prepC = getC('prepPrice', 'prepUnit', divRatio);
            const orbC = getC('orbPrice', 'orbUnit', divRatio);
            const totalBaseC = itemC + prepC;

            const mods = Array.from(document.querySelectorAll('.mod-box')).map(el => {
                const extActive = el.querySelector('.modExtToggle').checked;
                el.querySelector('.base-clarification').style.display = extActive ? 'block' : 'none';
                return {
                    min: parseInt(el.querySelector('.modMin').value),
                    max: parseInt(el.querySelector('.modMax').value),
                    target: parseInt(el.querySelector('.modTarget').value),
                    mode: el.querySelector('.modMode').value,
                    extActive: extActive,
                    extVal: (parseInt(el.querySelector('.modExtVal').value) / 100) + 1
                };
            });

            if (mods.length === 0) return;

            let totalProbPerSurvival = 1;
            mods.forEach(mod => {
                let success = 0;
                let combos = 0;
                for (let r = mod.min; r <= mod.max; r++) {
                    for (let m = 78; m <= 122; m++) {
                        let res = Math.round(r * (m / 100));
                        if (mod.extActive) res = Math.floor(res * mod.extVal);
                        const isWin = mod.mode === 'atMost' ? res <= mod.target : res >= mod.target;
                        if (isWin) success++;
                        combos++;
                    }
                }
                totalProbPerSurvival *= (success / combos);
            });

            const pFinal = 0.5 * totalProbPerSurvival;
            if (pFinal <= 0) {
                document.getElementById('resProb').innerText = "Impossible";
                document.getElementById('resAvgDiv').innerText = "-";
                return;
            }

            const avgOrbs = 1 / pFinal;
            const avgBases = 1 + (avgOrbs * 0.5);
            const avgCostC = (avgOrbs * orbC) + (avgBases * totalBaseC);
            const riskOrbs = Math.log(1 - 0.95) / Math.log(1 - pFinal);
            const riskBases = 1 + (riskOrbs * 0.5);
            const riskCostC = (riskOrbs * orbC) + (riskBases * totalBaseC);

            document.getElementById('resProb').innerText = (pFinal * 100).toFixed(3) + "%";
            document.getElementById('resAvgDiv').innerText = (avgCostC / divRatio).toFixed(1) + " Div";
            document.getElementById('resAvgChaos').innerText = Math.ceil(avgCostC).toLocaleString() + " Chaos";
            document.getElementById('resRisk').innerText = (riskCostC / divRatio).toFixed(1) + " Div";
            document.getElementById('statOrbs').innerText = avgOrbs.toFixed(1);
            document.getElementById('statBases').innerText = avgBases.toFixed(1);

            updateChart(mods[0]);
        }

        function getC(id, uId, r) {
            const v = parseFloat(document.getElementById(id).value) || 0;
            return document.getElementById(uId).value === 'd' ? v * r : v;
        }

        function updateChart(mod) {
            const freqs = {};
            let total = 0;
            for (let r = mod.min; r <= mod.max; r++) {
                for (let m = 78; m <= 122; m++) {
                    let res = Math.round(r * (m / 100));
                    if (mod.extActive) res = Math.floor(res * mod.extVal);
                    freqs[res] = (freqs[res] || 0) + 1;
                    total++;
                }
            }
            const labels = Object.keys(freqs).map(Number).sort((a,b) => a-b);
            const data = labels.map(k => (freqs[k] / total) * 100);
            const colors = labels.map(k => (mod.mode === 'atMost' ? k <= mod.target : k >= mod.target) ? 'rgba(234, 179, 8, 0.8)' : 'rgba(255, 255, 255, 0.05)');

            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('distChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0 }] },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#1a1a1a' }, ticks: { color: '#444' } },
                        x: { grid: { display: false }, ticks: { color: '#888', font: { family: 'Cinzel', size: 10 } } }
                    }
                }
            });
        }
        calculate();
        initializeMarketData();
    </script>
</body>
</html>
